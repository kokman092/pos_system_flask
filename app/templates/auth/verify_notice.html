{% extends "base/base.html" %}

{% block body %}
<div class="d-flex align-items-center justify-content-center vh-100 bg-dark">
    <div class="card glass-card shadow-lg p-5 text-center border-emerald" style="max-width: 500px; width: 100%;">
        <div class="text-emerald mb-3">
            <i class="fa-solid fa-envelope-open-text fs-1"></i>
        </div>
        <h3 class="fw-bold text-light mb-3">Verify your email</h3>
        <p class="text-secondary mb-4">We've sent a verification link to your email address. Please click the link to activate your account.</p>
        
        {% include 'partials/flash_messages.html' %}
        
        <div class="d-flex flex-column gap-2">
            <button class="btn btn-outline-emerald w-100">Resend Verification Email</button>
            <a href="{{ url_for('auth.login') }}" class="btn btn-link text-secondary text-decoration-none">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
