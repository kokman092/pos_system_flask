<div class="stat-card fade-in-up">
    <div class="d-flex justify-content-between align-items-start mb-2">
        <span class="stat-label">{{ label|default('—') }}</span>
        {% if icon %}
        <div class="stat-icon bg-emerald bg-opacity-10 text-emerald">
            <i class="{{ icon }}"></i>
        </div>
        {% endif %}
    </div>
    <div class="stat-value {{ value_class|default('text-light') }}">{{ value|default('0') }}</div>
    {% if subtitle %}
        <div class="text-secondary small mt-1">{{ subtitle }}</div>
    {% endif %}
    {% if trend is defined and trend is not none %}
        <div class="mt-2 small">
            {% if trend > 0 %}
                <span class="text-success"><i class="fa-solid fa-arrow-trend-up"></i> +{{ trend }}%</span>
            {% elif trend < 0 %}
                <span class="text-danger"><i class="fa-solid fa-arrow-trend-down"></i> {{ trend }}%</span>
            {% else %}
                <span class="text-secondary"><i class="fa-solid fa-minus"></i> 0%</span>
            {% endif %}
            <span class="text-secondary ms-1">vs last period</span>
        </div>
    {% endif %}
</div>
