<header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-2 shadow border-bottom border-secondary">
    <div class="d-flex w-100 justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <a class="navbar-brand me-0 px-3 fs-5 fw-bold text-emerald tracking-wide" href="{{ url_for('pos.pos_index') }}" aria-label="AURA Home">
                <i class="fa-solid fa-bolt me-2"></i>AURA
            </a>
            {% if current_user.is_authenticated and current_user.branch %}
            <span class="badge bg-secondary"><i class="fa-solid fa-store me-1"></i> {{ current_user.branch.name|default('Main Branch') }}</span>
            {% endif %}
        </div>

        <div class="d-none d-md-flex align-items-center gap-4">
            <a href="{{ url_for('pos.pos_index') }}" class="text-light text-decoration-none hover-emerald"><i class="fa-solid fa-cash-register me-1"></i> POS</a>
            <a href="{{ url_for('kitchen.index') }}" class="text-light text-decoration-none hover-emerald"><i class="fa-solid fa-fire-burner me-1"></i> Kitchen</a>
            <a href="{{ url_for('reservations.index') }}" class="text-light text-decoration-none hover-emerald"><i class="fa-solid fa-book-open me-1"></i> Reservations</a>
        </div>

        <div class="d-flex align-items-center gap-3 pe-3">
            <span class="badge bg-success"><i class="fa-solid fa-wifi me-1"></i> Online</span>
            <div class="text-secondary small">
                <i class="fa-solid fa-cloud-arrow-up me-1"></i> <span id="sync-count">0</span>
            </div>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-danger" aria-label="Sign out">
                <i class="fa-solid fa-right-from-bracket"></i>
            </a>
        </div>
    </div>
</header>
