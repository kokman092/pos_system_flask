{% if breadcrumbs %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-0">
        {% for item in breadcrumbs %}
            {% if loop.last %}
                <li class="breadcrumb-item active text-light" aria-current="page">{{ item.name }}</li>
            {% else %}
                <li class="breadcrumb-item"><a href="{{ item.url }}" class="text-emerald text-decoration-none">{{ item.name }}</a></li>
            {% endif %}
        {% endfor %}
    </ol>
</nav>
{% endif %}
